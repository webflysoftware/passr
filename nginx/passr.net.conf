server {
    server_name passr.net www.passr.net;

    root /var/www/passr.net;
    index index.html;

    location /.well-known/acme-challenge/ {
        allow all;
    }

    location /api {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # passr-api runs as PM2 service "passr-api" on port 3010 (/opt/passr-api)

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location ~ ^/article/([a-z0-9-]+)/?$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /article/$1/index.html /article.html =404;
    }

    location = /article.html {
        if ($arg_slug != "") {
            return 301 /article/$arg_slug;
        }
        return 404;
    }

    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/passr.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passr.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.passr.net) {
        return 301 https://$host$request_uri;
    }

    if ($host = passr.net) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name passr.net www.passr.net;
    return 404;
}
