  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const querySlug = params.get("slug");
      if (querySlug) {
        window.location.replace(articleUrl(querySlug));
        return;
      }

      const slug = getArticleSlugFromPath();
      const article = getArticle(slug);

      document.getElementById("footer-topics").innerHTML = CATEGORIES.map(
        (c) => `<li><a href="/topic.html?category=${c.slug}">${c.label}</a></li>`
      ).join("");

      if (!article) {
        document.getElementById("article-inner").innerHTML = `
          <div class="empty-state">
            <h1>Article not found</h1>
            <p style="margin-top:12px;"><a href="/" style="color:var(--accent);">Return home</a></p>
          </div>
        `;
        document.title = "Not found — PASSR";
        return;
      }

      mountArticlePage(slug);
    });
  </script>
